<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Khusus Buat Kamu ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            margin-bottom: 20px;
            font-size: 24px;
        }
        p {
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #ff4d6d;
            color: white;
        }
        .btn-primary:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }
        .btn-secondary {
            background-color: #ccc;
            color: #333;
        }
        /* Style khusus untuk tombol yang bisa pindah */
        #btn-no {
            position: absolute;
            transition: all 0.1s ease;
        }
        .hide {
            display: none;
        }
        .heart {
            font-size: 50px;
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="q1">
        <h1>Pertanyaan 1 🤔</h1>
        <p>Siapa orang yang paling ngangenin di dunia ini?</p>
        <div class="btn-container">
            <button class="btn-primary" onclick="wrongAnswer('q1')">Artis Korea</button>
            <button class="btn-primary" onclick="nextStep('q1', 'q2')">Pacar Aku yang Ganteng/Cantik</button>
        </div>
    </div>

    <div id="q2" class="hide">
        <h1>Pertanyaan 2 🍦</h1>
        <p>Kalau aku tiba-tiba ngilang tanpa kabar, kamu bakal ngapain?</p>
        <div class="btn-container">
            <button class="btn-primary" onclick="nextStep('q2', 'q3')">Nyarain & Spam Chat Sampai Ketemu</button>
            <button class="btn-primary" onclick="wrongAnswer('q2')">Biarin aja, paling lagi tidur</button>
        </div>
    </div>

    <div id="q3" class="hide" style="height: 200px;">
        <h1>Pertanyaan Terakhir 🥰</h1>
        <p>Kamu sayang ga sama aku?</p>
        <div class="btn-container" style="position: relative; height: 100px; width: 100%;">
            <button class="btn-primary" id="btn-yes" onclick="nextStep('q3', 'final')" style="position: absolute; left: 20px;">Sayang Banget!</button>
            <button class="btn-secondary" id="btn-no" onmouseover="moveButton()" onclick="moveButton()" style="position: absolute; right: 20px;">Enggak</button>
        </div>
    </div>

    <div id="final" class="hide">
        <div class="heart">❤️</div>
        <h1>Yeayyy! I Love You!</h1>
        <p>Makasih ya udah selalu ada buat aku. Have a wonderful day, Sayang! ✨</p>
    </div>
</div>

<script>
    // Fungsi untuk lanjut ke pertanyaan berikutnya
    function nextStep(currentId, nextId) {
        document.getElementById(currentId).classList.add('hide');
        document.getElementById(nextId).classList.remove('hide');
    }

    // Fungsi kalau milih jawaban yang salah
    function wrongAnswer(currentId) {
        if(currentId === 'q1') {
            alert('Eits, salah! Coba tebak lagi 😜');
        } else if(currentId === 'q2') {
            alert('Masa dibiarin sih? Ngambek nih! 🥺');
        }
    }

    // Fungsi rahasia biar tombol "Enggak" kabur pas dideketin kursor/diklik
    function moveButton() {
        const btnNo = document.getElementById('btn-no');
        const container = document.querySelector('.container');
        
        // Menghitung batas aman agar tombol tidak keluar dari kotak container
        const maxX = container.clientWidth - btnNo.clientWidth - 40;
        const maxY = container.clientHeight - btnNo.clientHeight - 100;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY) + 80; // offset dari atas biar gak nabrak teks

        btnNo.style.left = randomX + 'px';
        btnNo.style.top = randomY + 'px';
    }
</script>

</body>
</html>
